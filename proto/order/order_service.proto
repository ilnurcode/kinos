syntax = "proto3";

package order;

option go_package = "kinos/proto/order;order";

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (Order);
  rpc GetOrder(GetOrderRequest) returns (Order);
  rpc GetListOrders(GetListOrdersRequest) returns (ListOrdersResponse);
  rpc CancelOrder(CancelOrderRequest) returns (Order);
  rpc GetUserOrders(GetUserOrdersRequest) returns (ListOrdersResponse);
}

message CreateOrderRequest {
  uint64 user_id = 1;
  repeated OrderItem items = 2;
  string delivery_address = 3;
  string phone = 4;
  string comment = 5;
}

message GetOrderRequest {
  uint64 order_id = 1;
}

message GetListOrdersRequest {
  int32 limit = 1;
  int32 offset = 2;
  string status = 3;
}

message CancelOrderRequest {
  uint64 order_id = 1;
}

message GetUserOrdersRequest {
  uint64 user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message Order {
  uint64 id = 1;
  uint64 user_id = 2;
  repeated OrderItem items = 3;
  double total = 4;
  string status = 5;
  string delivery_address = 6;
  string phone = 7;
  string comment = 8;
  string created_at = 9;
  string updated_at = 10;
}

message OrderItem {
  uint64 product_id = 1;
  string product_name = 2;
  uint32 quantity = 3;
  double price = 4;
  double subtotal = 5;
}

message ListOrdersResponse {
  repeated Order orders = 1;
  int32 total = 2;
}
