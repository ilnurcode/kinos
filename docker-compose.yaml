services:
  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: kinos-user-service
    env_file:
      - ./services/user-service/.env.docker
    ports:
      - "8081:8081"
    depends_on:
      user-db:
        condition: service_healthy

  catalog-service:
    build:
      context: .
      dockerfile: services/catalog-service/Dockerfile
    container_name: kinos-catalog-service
    env_file:
      - ./services/catalog-service/.env.docker
    ports:
      - "8082:8082"
    depends_on:
      catalog-db:
        condition: service_healthy

  api-service:
    build:
      context: .
      dockerfile: services/api-service/Dockerfile
    container_name: kinos-api-service
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - catalog-service

  user-db:
    image: postgres:18.2-bookworm
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: kinos
      POSTGRES_PASSWORD: kinos123
    volumes:
      - user_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kinos -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  catalog-db:
    image: postgres:18.2-bookworm
    container_name: catalog-db
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: kinos
      POSTGRES_PASSWORD: kinos123
    volumes:
      - catalog_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kinos -d catalog_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  user_db_data:
  catalog_db_data:
