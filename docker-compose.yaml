services:
    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        container_name: kinos-frontend
        ports:
            - "80:80"
        depends_on:
            - api-service
        restart: unless-stopped

    user-service:
        build:
            context: .
            dockerfile: services/user-service/Dockerfile
        container_name: kinos-user-service
        env_file:
            - ./services/user-service/.env.docker
        ports:
            - "8081:8081"
        depends_on:
            user-db:
                condition: service_healthy
        restart: unless-stopped

    catalog-service:
        build:
            context: .
            dockerfile: services/catalog-service/Dockerfile
        container_name: kinos-catalog-service
        env_file:
            - ./services/catalog-service/.env.docker
        ports:
            - "8082:8082"
        depends_on:
            catalog-db:
                condition: service_healthy
        restart: unless-stopped

    inventory-service:
        build:
            context: .
            dockerfile: services/inventory-service/Dockerfile
        container_name: kinos-inventory-service
        env_file:
            - ./services/inventory-service/.env.docker
        ports:
            - "8083:8083"
        depends_on:
            inventory-db:
                condition: service_healthy
        restart: unless-stopped

    cart-service:
        build:
            context: .
            dockerfile: services/cart-service/Dockerfile
        container_name: kinos-cart-service
        env_file:
            - ./services/cart-service/.env.docker
        ports:
            - "8084:8084"
        depends_on:
            redis:
                condition: service_healthy
        restart: unless-stopped

    order-service:
        build:
            context: .
            dockerfile: services/order-service/Dockerfile
        container_name: kinos-order-service
        env_file:
            - ./services/order-service/.env.docker
        ports:
            - "8085:8085"
        depends_on:
            order-db:
                condition: service_healthy
        restart: unless-stopped

    api-service:
        build:
            context: .
            dockerfile: services/api-service/Dockerfile
        container_name: kinos-api-service
        environment:
            API_HTTP_PORT: "8080"
            USER_GRPC_ADDR: user-service:8081
            CATALOG_GRPC_ADDR: catalog-service:8082
            INVENTORY_GRPC_ADDR: inventory-service:8083
            CART_GRPC_ADDR: cart-service:8084
            ORDER_GRPC_ADDR: order-service:8085
            CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:5173,http://localhost:3000
        ports:
            - "8080:8080"
        depends_on:
            - user-service
            - catalog-service
            - inventory-service
            - cart-service
            - order-service
        restart: unless-stopped

    user-db:
        image: postgres:18.2-bookworm
        container_name: user-db
        ports:
            - "54321:5432"
        environment:
            POSTGRES_DB: user_db
            POSTGRES_USER: kinos
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
        volumes:
            - user_db_data:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U kinos -d user_db"]
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    catalog-db:
        image: postgres:18.2-bookworm
        container_name: catalog-db
        ports:
            - "54322:5432"
        environment:
            POSTGRES_DB: catalog_db
            POSTGRES_USER: kinos
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
        volumes:
            - catalog_db_data:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U kinos -d catalog_db"]
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    inventory-db:
        image: postgres:18.2-bookworm
        container_name: inventory-db
        ports:
            - "54323:5432"
        environment:
            POSTGRES_DB: inventory_db
            POSTGRES_USER: kinos
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
        volumes:
            - inventory_db_data:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U kinos -d inventory_db"]
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    order-db:
        image: postgres:18.2-bookworm
        container_name: order-db
        ports:
            - "54324:5432"
        environment:
            POSTGRES_DB: order_db
            POSTGRES_USER: kinos
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
        volumes:
            - order_db_data:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U kinos -d order_db"]
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        container_name: kinos-redis
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        command: redis-server --appendonly yes
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped

volumes:
    user_db_data:
    catalog_db_data:
    inventory_db_data:
    order_db_data:
    redis_data:
