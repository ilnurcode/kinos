<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body>
<!-- Навигационная панель -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Kinos</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="/catalog">Каталог</a></li>
                <li class="nav-item" id="nav-login"><a class="nav-link" href="/login">Вход</a></li>
                <li class="nav-item" id="nav-register"><a class="nav-link" href="/register">Регистрация</a></li>
                <li class="nav-item d-none" id="nav-profile"><a class="nav-link" href="/profile">Профиль</a></li>
                <li class="nav-item d-none" id="nav-admin"><a class="nav-link text-warning" href="/admin/users">Админ</a></li>
                <li class="nav-item d-none" id="nav-logout"><a class="nav-link text-danger" href="#" id="logoutBtn">Выйти</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Основной контент -->
<main class="container py-5">
    <div class="hero-section">
        <h1 class="display-5">Добро пожаловать в Kinos!</h1>
        <p class="lead">Ваш любимый магазин электроники</p>
        <div class="mt-4">
            <a href="/login" class="btn btn-primary btn-lg me-2" id="loginBtn">Войти</a>
            <a href="/register" class="btn btn-success btn-lg" id="registerBtn">Регистрация</a>
            <a href="/profile" class="btn btn-primary btn-lg d-none" id="profileBtn">Профиль</a>
        </div>
    </div>
</main>

<!-- Подвал -->
<footer class="py-3 mt-auto">
    <div class="container text-center text-muted small">
        &copy; <span id="year"></span> Kinos. Все права защищены.
    </div>
</footer>

<!-- Скрипты -->
<script src="/static/js/auth.js"></script>
<script src="/static/js/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('year').textContent = new Date().getFullYear();
    
    // Обновляем вид навигации при загрузке
    document.addEventListener('DOMContentLoaded', () => {
        const isAuth = isAuthenticated();
        document.getElementById('loginBtn').classList.toggle('d-none', isAuth);
        document.getElementById('registerBtn').classList.toggle('d-none', isAuth);
        document.getElementById('profileBtn').classList.toggle('d-none', !isAuth);
    });
</script>
</body>
</html>
