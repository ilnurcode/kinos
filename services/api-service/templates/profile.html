<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body>
<!-- Навигационная панель -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Kinos</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="/catalog">Каталог</a></li>
                <li class="nav-item d-none" id="nav-login"><a class="nav-link" href="/login">Вход</a></li>
                <li class="nav-item d-none" id="nav-register"><a class="nav-link" href="/register">Регистрация</a></li>
                <li class="nav-item" id="nav-profile"><a class="nav-link" href="/profile">Профиль</a></li>
                <li class="nav-item d-none" id="nav-admin"><a class="nav-link text-warning" href="/admin/users">Админ</a></li>
                <li class="nav-item" id="nav-logout"><a class="nav-link text-danger" href="#" id="logoutBtn">Выйти</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="profile-card card shadow-md">
        <div class="card-header">
            <h4 class="mb-0">Личный профиль</h4>
        </div>
        <div class="card-body">
            <div class="profile-info">
                <p><strong>Имя пользователя:</strong> <span id="username">—</span></p>
                <p><strong>Email:</strong> <span id="email">—</span></p>
                <p><strong>Телефон:</strong> <span id="phone">—</span></p>
            </div>
            <div id="profile-actions" class="mt-4">
                <a href="/profile/edit" class="btn btn-primary me-2">Редактировать профиль</a>
            </div>
            <div id="error-message" class="alert alert-danger mt-3" style="display:none;"></div>
        </div>
    </div>
</main>

<!-- Подвал -->
<footer class="py-3 mt-auto">
    <div class="container text-center text-muted small">
        &copy; <span id="year"></span> Kinos. Все права защищены.
    </div>
</footer>

<!-- Скрипты -->
<script src="/static/js/auth.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/profile.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
