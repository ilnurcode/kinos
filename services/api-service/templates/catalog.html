<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body>
<!-- Навигационная панель -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Kinos</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
                <li class="nav-item"><a class="nav-link active" href="/catalog">Каталог</a></li>
                <li class="nav-item" id="nav-login"><a class="nav-link" href="/login">Вход</a></li>
                <li class="nav-item" id="nav-register"><a class="nav-link" href="/register">Регистрация</a></li>
                <li class="nav-item d-none" id="nav-profile"><a class="nav-link" href="/profile">Профиль</a></li>
                <li class="nav-item d-none" id="nav-admin"><a class="nav-link text-warning" href="/admin/users">Админ</a></li>
                <li class="nav-item d-none" id="nav-logout"><a class="nav-link text-danger" href="#" id="logoutBtn">Выйти</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-5">
    <h1 class="mb-4">Каталог товаров</h1>

    <!-- Фильтры -->
    <div class="card shadow-sm mb-4 filters-card">
        <div class="card-header">
            <h5 class="mb-0">Фильтры</h5>
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Категория</label>
                    <select class="form-select" id="filterCategory">
                        <option value="">Все</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Производитель</label>
                    <select class="form-select" id="filterManufacturer">
                        <option value="">Все</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Цена от (₽)</label>
                    <input type="number" class="form-control" id="filterPriceMin" min="0" placeholder="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Цена до (₽)</label>
                    <input type="number" class="form-control" id="filterPriceMax" min="0" placeholder="0">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Поиск</label>
                    <input type="text" class="form-control" id="filterName" placeholder="Название">
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-12">
                    <button class="btn btn-primary" id="applyFilters">Применить</button>
                    <button class="btn btn-secondary ms-2" id="resetFilters">Сбросить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Сортировка -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <span class="text-muted">Найдено товаров: <strong id="totalProducts">0</strong></span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <label class="text-muted">Сортировать:</label>
            <select class="form-select form-select-sm" id="sortOrder" style="width: auto;">
                <option value="default">По умолчанию</option>
                <option value="price_asc">По цене (возрастание)</option>
                <option value="price_desc">По цене (убывание)</option>
                <option value="name_asc">По названию (А-Я)</option>
                <option value="name_desc">По названию (Я-А)</option>
            </select>
        </div>
    </div>

    <!-- Сетка товаров -->
    <div id="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Загрузка...</span>
        </div>
        <p class="mt-2 text-muted">Загрузка товаров...</p>
    </div>
    
    <div id="productsGrid" class="row g-4" style="display:none;">
        <!-- Товары будут загружены сюда через JS -->
    </div>

    <!-- Пустое состояние -->
    <div id="emptyState" class="empty-state" style="display:none;">
        <div class="empty-state-icon">📦</div>
        <h4>Товары не найдены</h4>
        <p class="text-muted">Попробуйте изменить параметры фильтров</p>
    </div>
</main>

<!-- Модальное окно товара -->
<div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="productModalLabel">Информация о товаре</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body">
                <div id="productModalContent">
                    <!-- Информация о товаре будет загружена сюда -->
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
            </div>
        </div>
    </div>
</div>

<!-- Подвал -->
<footer class="py-3 mt-auto">
    <div class="container text-center text-muted small">
        &copy; <span id="year"></span> Kinos. Все права защищены.
    </div>
</footer>

<!-- Скрипты -->
<script src="/static/js/auth.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/catalog.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
