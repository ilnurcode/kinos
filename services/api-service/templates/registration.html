<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body>
<!-- Навигационная панель -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Kinos</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="/catalog">Каталог</a></li>
                <li class="nav-item" id="nav-login"><a class="nav-link" href="/login">Вход</a></li>
                <li class="nav-item" id="nav-register"><a class="nav-link" href="/register">Регистрация</a></li>
                <li class="nav-item d-none" id="nav-profile"><a class="nav-link" href="/profile">Профиль</a></li>
                <li class="nav-item d-none" id="nav-admin"><a class="nav-link text-warning" href="/admin/users">Админ</a></li>
                <li class="nav-item d-none" id="nav-logout"><a class="nav-link text-danger" href="#" id="logoutBtn">Выйти</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container">
    <div class="auth-container">
        <div class="auth-card card shadow-md">
            <div class="card-body p-5">
                <h3 class="card-title text-center mb-4">Регистрация</h3>
                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label">Имя пользователя</label>
                        <input type="text" class="form-control" id="username" name="username" required placeholder="Ivan">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="example@mail.ru">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="password" name="password" required minlength="8" placeholder="••••••••">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Телефон</label>
                        <div class="input-group">
                            <span class="input-group-text">+7</span>
                            <input type="tel" class="form-control" id="phone" name="phone" pattern="^\+7\d{10}$" placeholder="999 123 45 67" maxlength="16" required>
                        </div>
                        <small class="text-muted">Введите 10 цифр номера (например: 999 123 45 67)</small>
                    </div>
                    <button type="submit" class="btn btn-success w-100 btn-lg">Зарегистрироваться</button>
                </form>
                <div id="message" class="alert mt-3" style="display:none;"></div>
                <div class="text-center mt-4">
                    <p class="text-muted mb-0">Уже есть аккаунт? <a href="/login">Войти</a></p>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Подвал -->
<footer class="py-3 mt-auto">
    <div class="container text-center text-muted small">
        &copy; <span id="year"></span> Kinos. Все права защищены.
    </div>
</footer>

<!-- Скрипты -->
<script src="/static/js/auth.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/registration.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
