<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>

<body>
    <!-- Навигационная панель -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Kinos</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="nav nav-tabs">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/users">Пользователи</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/admin/categories">Категории</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/manufacturers">Производители</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/products">Товары</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/inventory">Запасы</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/warehouses">Склады</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <h2 class="mb-4">Управление категориями</h2>

        <!-- Форма создания категории -->
        <div class="card shadow-sm mb-4">
            <div class="card-header">
                <h5 class="mb-0">Новая категория</h5>
            </div>
            <div class="card-body">
                <form id="createCategoryForm" class="row g-3 align-items-end">
                    <div class="col-md-8">
                        <label class="form-label">Название категории</label>
                        <input type="text" class="form-control" id="catName" required maxlength="100"
                            placeholder="Например: Электроника">
                    </div>
                    <div class="col-md-4">
                        <button type="submit" class="btn btn-primary w-100">Создать</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Таблица категорий -->
        <div class="card shadow-sm">
            <div class="card-header">
                <h5 class="mb-0">Список категорий</h5>
            </div>
            <div class="card-body">
                <div id="loading" class="text-center py-4">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Загрузка...</span>
                    </div>
                    <p class="mt-2 text-muted">Загрузка категорий...</p>
                </div>
                <table class="table table-striped table-hover" id="categoriesTable" style="display:none;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Название</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Модальное окно редактирования -->
    <div class="modal fade" id="editCategoryModal" tabindex="-1" aria-labelledby="editCategoryModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editCategoryModalLabel">Редактировать категорию</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body">
                    <form id="editCategoryForm">
                        <input type="hidden" id="editCatId">
                        <div class="mb-3">
                            <label class="form-label">Название</label>
                            <input type="text" class="form-control" id="editCatName" required maxlength="100">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" id="saveCategoryBtn">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Подвал -->
    <footer class="py-3 mt-auto">
        <div class="container text-center text-muted small">
            &copy; <span id="year"></span> Kinos. Все права защищены.
        </div>
    </footer>

    <!-- Скрипты -->
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/admin/categories.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>

</html>
