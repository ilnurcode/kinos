<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Kinos</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="nav nav-tabs">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/users">Пользователи</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/categories">Категории</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/manufacturers">Производители</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/products">Товары</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/inventory">Запасы</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/admin/warehouses">Склады</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Управление складами</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#warehouseModal"
                onclick="openCreateModal()">
                <i class="bi bi-plus-lg"></i> Добавить склад
            </button>
        </div>

        <!-- Таблица складов -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Название</th>
                                <th>Адрес</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="warehouseTable">
                            <tr>
                                <td colspan="4" class="text-center">Загрузка...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Модальное окно для создания/редактирования склада -->
    <div class="modal fade" id="warehouseModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Добавить склад</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="warehouseForm">
                        <input type="hidden" id="warehouseId">
                        <div class="mb-3">
                            <label class="form-label">Название склада *</label>
                            <input type="text" class="form-control" id="warehouseName" required
                                placeholder="Основной склад">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Город *</label>
                            <input type="text" class="form-control" id="warehouseCity" required placeholder="Москва">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Улица *</label>
                            <input type="text" class="form-control" id="warehouseStreet" required
                                placeholder="ул. Примерная">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Дом</label>
                                <input type="text" class="form-control" id="warehouseBuilding" placeholder="1">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Строение</label>
                                <input type="text" class="form-control" id="warehouseBuilding2" placeholder="1А">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" onclick="saveWarehouse()">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-3 mt-auto">
        <div class="container text-center text-muted small">
            &copy; <span id="year"></span> Kinos. Все права защищены.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/admin/warehouses.js"></script>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>

</html>
