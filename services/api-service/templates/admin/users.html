<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>

<body>
    <!-- Навигационная панель -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Kinos</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="nav nav-tabs">
                    <li class="nav-item">
                        <a class="nav-link active" href="/admin/users">Пользователи</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/categories">Категории</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/manufacturers">Производители</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/products">Товары</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/inventory">Запасы</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/warehouses">Склады</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <h2 class="mb-4">Управление пользователями</h2>

        <!-- Таблица пользователей -->
        <div class="card shadow-sm">
            <div class="card-header">
                <h5 class="mb-0">Список пользователей</h5>
            </div>
            <div class="card-body">
                <div id="loading" class="text-center py-4">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Загрузка...</span>
                    </div>
                    <p class="mt-2 text-muted">Загрузка пользователей...</p>
                </div>
                <table class="table table-striped table-hover" id="usersTable" style="display:none;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Имя</th>
                            <th>Email</th>
                            <th>Телефон</th>
                            <th>Роль</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- Форма изменения роли -->
        <div class="card shadow-sm mt-4">
            <div class="card-header">
                <h5 class="mb-0">Изменить роль пользователя</h5>
            </div>
            <div class="card-body">
                <form id="roleForm" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">ID пользователя</label>
                        <input type="number" class="form-control" id="userId" name="userId" required placeholder="1">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Новая роль</label>
                        <select class="form-select" id="newRole" name="newRole">
                            <option value="user">user</option>
                            <option value="admin">admin</option>
                        </select>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Изменить</button>
                    </div>
                </form>
            </div>
        </div>
        <div id="message" class="alert mt-3" style="display:none;"></div>
    </main>

    <!-- Подвал -->
    <footer class="py-3 mt-auto">
        <div class="container text-center text-muted small">
            &copy; <span id="year"></span> Kinos. Все права защищены.
        </div>
    </footer>

    <!-- Скрипты -->
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/users.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>

</html>
