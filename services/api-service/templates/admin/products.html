<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>

<body>
    <!-- Навигационная панель -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Kinos</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="nav nav-tabs">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/users">Пользователи</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/categories">Категории</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/manufacturers">Производители</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/admin/products">Товары</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/inventory">Запасы</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/warehouses">Склады</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <h2 class="mb-4">Управление товарами</h2>

        <!-- Форма создания товара -->
        <div class="card shadow-sm mb-4">
            <div class="card-header">
                <h5 class="mb-0">Новый товар</h5>
            </div>
            <div class="card-body">
                <form id="createProductForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Название товара</label>
                            <input type="text" class="form-control" id="prodName" required maxlength="100"
                                placeholder="Например: Смартфон Galaxy S24">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Категория</label>
                            <select class="form-select" id="prodCategory" required>
                                <option value="">Выберите категорию</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Производитель</label>
                            <select class="form-select" id="prodManufacturer" required>
                                <option value="">Выберите производителя</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Цена (₽)</label>
                            <input type="number" step="0.01" class="form-control" id="prodPrice" required min="0.01"
                                placeholder="0.00">
                        </div>
                        <div class="col-md-3 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100">Создать</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Фильтры -->
        <div class="card shadow-sm mb-4 filters-card">
            <div class="card-header">
                <h5 class="mb-0">Фильтры товаров</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Категория</label>
                        <select class="form-select" id="filterCategory">
                            <option value="">Все</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Производитель</label>
                        <select class="form-select" id="filterManufacturer">
                            <option value="">Все</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Цена от</label>
                        <input type="number" class="form-control" id="filterPriceMin" min="0" placeholder="0">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Цена до</label>
                        <input type="number" class="form-control" id="filterPriceMax" min="0" placeholder="0">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Название</label>
                        <input type="text" class="form-control" id="filterName" placeholder="Поиск">
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-12">
                        <button class="btn btn-primary" id="applyFilters">Применить фильтры</button>
                        <button class="btn btn-secondary ms-2" id="resetFilters">Сбросить</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Таблица товаров -->
        <div class="card shadow-sm">
            <div class="card-header">
                <h5 class="mb-0">Список товаров</h5>
            </div>
            <div class="card-body">
                <div id="loading" class="text-center py-4">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Загрузка...</span>
                    </div>
                    <p class="mt-2 text-muted">Загрузка товаров...</p>
                </div>
                <table class="table table-striped table-hover" id="productsTable" style="display:none;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Название</th>
                            <th>Категория</th>
                            <th>Производитель</th>
                            <th>Цена</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Модальное окно редактирования товара -->
    <div class="modal fade" id="editProductModal" tabindex="-1" aria-labelledby="editProductModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editProductModalLabel">Редактировать товар</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body">
                    <form id="editProductForm">
                        <input type="hidden" id="editProdId">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Название</label>
                                <input type="text" class="form-control" id="editProdName" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Категория</label>
                                <select class="form-select" id="editProdCategory" required>
                                    <option value="">Выберите категорию</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Производитель</label>
                                <select class="form-select" id="editProdManufacturer" required>
                                    <option value="">Выберите производителя</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Цена (₽)</label>
                                <input type="number" step="0.01" class="form-control" id="editProdPrice" required
                                    min="0">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" id="saveProductBtn">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Подвал -->
    <footer class="py-3 mt-auto">
        <div class="container text-center text-muted small">
            &copy; <span id="year"></span> Kinos. Все права защищены.
        </div>
    </footer>

    <!-- Скрипты -->
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/admin/products.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>

</html>
