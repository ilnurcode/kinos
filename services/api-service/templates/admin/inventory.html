<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>

<body>
    <!-- Навигационная панель -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Kinos</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="nav nav-tabs">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/users">Пользователи</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/categories">Категории</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/manufacturers">Производители</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/products">Товары</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/admin/inventory">Запасы</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/warehouses">Склады</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Управление запасами</h2>
            <div>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#inventoryModal"
                    onclick="openCreateModal()">
                    <i class="bi bi-plus-lg"></i> Добавить запас
                </button>
            </div>
        </div>

        <!-- Фильтры -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title mb-3">Фильтры</h5>
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Товар</label>
                        <select class="form-select" id="filterProductId">
                            <option value="">Все товары</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Склад</label>
                        <select class="form-select" id="filterWarehouseId">
                            <option value="">Все склады</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Кол-во от</label>
                        <input type="number" class="form-control" id="filterMinQty" value="0" min="0" placeholder="0">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Кол-во до</label>
                        <input type="number" class="form-control" id="filterMaxQty" min="0" placeholder="∞">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button class="btn btn-outline-primary w-100" onclick="applyFilters()">Применить</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Таблица запасов -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Товар</th>
                                <th>Всего</th>
                                <th>Зарезервировано</th>
                                <th>Доступно</th>
                                <th>Склад</th>
                                <th>Обновлено</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTable">
                            <tr>
                                <td colspan="7" class="text-center">Загрузка...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Модальное окно для создания/редактирования -->
    <div class="modal fade" id="inventoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Добавить запас</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="inventoryForm">
                        <input type="hidden" id="inventoryId">
                        <div class="mb-3">
                            <label class="form-label">Товар *</label>
                            <select class="form-select" id="productId" required>
                                <option value="">Выберите товар</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Количество *</label>
                            <input type="number" class="form-control" id="quantity" required min="0" value="0" step="1">
                            <small class="text-muted">Используйте стрелочки или введите вручную</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Склад *</label>
                            <select class="form-select" id="warehouseId" required>
                                <option value="">Выберите склад</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" onclick="saveInventory()">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Подвал -->
    <footer class="py-3 mt-auto">
        <div class="container text-center text-muted small">
            &copy; <span id="year"></span> Kinos. Все права защищены.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/admin/inventory.js"></script>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>

</html>
